  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --g:#00B14F;--gd:#007a36;--gl:#e6f7ee;
      --bg:#f0f2f5;--w:#fff;--border:#e0e6ed;
      --text:#1a1a2e;--mid:#556;--light:#9aa;
      --shadow:0 4px 24px rgba(0,0,0,.09);--r:18px;
      --grab-orange:#ff5200;
    }
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);height:100vh;display:flex;align-items:center;justify-content:center}
    .app{width:450px;max-width:100vw;height:94vh;max-height:880px;background:var(--w);border-radius:24px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}

    /* ── Header ── */
    .hdr{background:linear-gradient(135deg,#00B14F 0%,#007a36 100%);padding:14px 18px;display:flex;align-items:center;gap:11px;flex-shrink:0}
    .hdr-av{width:44px;height:44px;background:rgba(255,255,255,.18);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
    .hdr-info h1{color:#fff;font-size:15px;font-weight:700}
    .hdr-info p{color:rgba(255,255,255,.75);font-size:11px;margin-top:2px}
    .hdr-r{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:3px}
    .hbadge{background:rgba(255,255,255,.18);color:#fff;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px}
    .hpeak{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
    .hpeak.red{background:rgba(220,50,50,.3);color:#ffaaaa}
    .hpeak.yellow{background:rgba(255,200,0,.25);color:#ffe066}
    .hpeak.green{background:rgba(100,255,150,.2);color:#aaffcc}

    /* ── Chat ── */
    .chat{flex:1;overflow-y:auto;padding:16px 13px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth}
    .chat::-webkit-scrollbar{width:3px}
    .chat::-webkit-scrollbar-thumb{background:#dde;border-radius:3px}

    /* ── Messages ── */
    .row{display:flex;align-items:flex-end;gap:7px;animation:fu .2s ease}
    .row.user{flex-direction:row-reverse}
    @keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .bicon{width:27px;height:27px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .bub{max-width:80%;padding:10px 13px;border-radius:var(--r);font-size:13.5px;line-height:1.55;color:var(--text)}
    .bub.bot{background:var(--w);border:1px solid var(--border);border-bottom-left-radius:4px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
    .bub.user{background:var(--g);color:#fff;border-bottom-right-radius:4px}
    .bub.grab-bub{background:#fff5f0;border:1.5px solid #ff5200;border-bottom-left-radius:4px}

    /* ── Typing ── */
    .typing{display:flex;align-items:flex-end;gap:7px}
    .tdots{background:var(--w);border:1px solid var(--border);border-bottom-left-radius:4px;padding:10px 14px;border-radius:var(--r);display:flex;gap:5px;align-items:center}
    .tdots span{width:6px;height:6px;background:#bbc;border-radius:50%;animation:bo 1.2s infinite}
    .tdots span:nth-child(2){animation-delay:.2s}
    .tdots span:nth-child(3){animation-delay:.4s}
    @keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

    /* ── Quick replies ── */
    .qr{display:flex;flex-wrap:wrap;gap:6px;padding:3px 13px 11px;animation:fu .25s ease}
    .qb{background:var(--w);border:1.5px solid var(--g);color:var(--g);font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:20px;cursor:pointer;transition:all .15s;white-space:nowrap}
    .qb:hover{background:var(--g);color:#fff}
    .qb.grab-qb{border-color:var(--grab-orange);color:var(--grab-orange)}
    .qb.grab-qb:hover{background:var(--grab-orange);color:#fff}

    /* ── Input ── */
    .inp-wrap{padding:9px 13px 13px;border-top:1px solid var(--border);display:flex;gap:7px;flex-shrink:0}
    .inp-wrap input{flex:1;border:1.5px solid var(--border);border-radius:22px;padding:9px 15px;font-size:13.5px;outline:none;color:var(--text);transition:border .2s}
    .inp-wrap input:focus{border-color:var(--g)}
    .inp-wrap input::placeholder{color:var(--light)}
    .sbtn{width:40px;height:40px;background:var(--g);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
    .sbtn:hover{background:var(--gd)}
    .sbtn svg{fill:#fff}

    /* ── Restaurant Card ── */
    .rc{background:var(--w);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;margin-top:5px;transition:box-shadow .2s,border-color .2s}
    .rc:hover{box-shadow:0 4px 16px rgba(0,177,79,.13);border-color:var(--g)}
    .rc.grab-card{border-color:#ff5200}

    .rc-head.dinner-head{background:#f0f0ff}
    .rc-head.grab-head{background:#fff5f0}
    .rc-name{font-weight:700;font-size:13.5px;color:var(--text);line-height:1.3}
    .rc-r{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0}
    .rc-price{font-weight:700;font-size:12px;color:var(--gd)}
    .rc-rating{font-size:12px;font-weight:700;color:#e67e00}
    .rc-body{padding:9px 12px}
    .rc-meta{font-size:11.5px;color:var(--mid);margin-bottom:4px}
    .rc-desc{font-size:12.5px;color:var(--text);line-height:1.5}
    .rc-deal{font-size:11.5px;color:#c0580a;margin-top:3px;font-weight:600}
    .rc-pt{font-size:11px;margin-top:4px;font-weight:600;background:#f3e5f5;padding:3px 7px;border-radius:5px;display:inline-block;color:#7b1fa2}
    .rc-pt.warn{background:#fdecea;color:#b71c1c}
    .pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
    .pl{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:20px}

    .pl.drive{background:#e3f2fd;color:#1565c0}
    .pl.t{background:#fff3e0;color:#e65100}
    .pl.vb{background:#f3e5f5;color:#7b1fa2}
    .pl.h{background:#e3f2fd;color:#1565c0}
    .pl.gr{background:#e6f7ee;color:#00803a}
    .pl.gp{background:#fce4ec;color:#c62828}
    .pl.dl{background:#fffde7;color:#f57f17}
    .pl.ar{background:#f0f4ff;color:#3949ab}

    /* ── Why this pick ── */
    .why-picks{margin-top:8px;padding:6px 10px;background:#f6fdf9;border-left:3px solid var(--g);border-radius:0 6px 6px 0}
    .why-label{font-size:10px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
    .why-tag{font-size:11px;font-weight:600;color:#1a5c3a;background:#e3f4ec;padding:2px 9px;border-radius:20px;display:inline-block;margin:2px 3px 2px 0}

    /* ── Social badges ── */
    .socrow{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
    .sb{font-size:10px;font-weight:700;padding:2px 6px;border-radius:20px}
    .sb.tiktok{background:#000;color:#fff}
    .sb.instagram{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);color:#fff}
    .sb.xhs{background:#ff2442;color:#fff}
    .sb.klfoodie{background:#ff6b00;color:#fff}
    .sb.wongnai{background:#6c3483;color:#fff}
    .sb.lemon8{background:#e8b600;color:#1a1a1a}
    .sb.bkmagazine{background:#1a4a6b;color:#fff}
    .sb.hungryhub{background:#FF4D00;color:#fff}
    .pl.bts{background:#1a237e;color:#fff}

    /* ── City selector ── */
    .city-tabs{display:flex;flex-direction:column;gap:8px;margin:8px 0 4px}
    .city-btn{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid #ddd;border-radius:12px;padding:12px 16px;cursor:pointer;text-align:left;width:100%;transition:all .15s}
    .city-btn:hover:not(.coming-soon){border-color:var(--g);background:#f6fdf9}
    .city-btn.coming-soon{opacity:.5;cursor:default}
    .city-flag{font-size:26px;line-height:1}
    .city-info{display:flex;flex-direction:column;gap:2px;flex:1}
    .city-name{font-weight:700;font-size:14px;color:var(--text)}

    /* ── Reset btn ── */

    .reset-btn{background:none;border:1.5px solid var(--border);color:var(--mid);font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;transition:all .2s}
    .reset-btn:hover{border-color:var(--g);color:var(--g)}

    .mt-btn .mt-label{font-size:12px;font-weight:700;color:var(--text);display:block}
    .mt-btn .mt-sub{font-size:10.5px;color:var(--light);display:block}
    .mt-btn:hover{border-color:var(--g);background:var(--gl)}
    .mt-btn.grab{border-color:#ff5200}
    .mt-btn.grab:hover{background:#fff5f0}
    .mt-btn.grab .mt-label{color:#ff5200}

// ─── Peak time ────────────────────────────────────────────────────────────────
function getPeak() {
  const now = new Date(), h = now.getHours(), m = now.getMinutes();
  const mins = h*60+m, wd = now.getDay(), weekend = wd===0||wd===6;
  if (weekend) {
    if (mins>=720&&mins<=900) return {level:'red',label:'🔴 Weekend Peak',note:'Busy 12–3 PM weekends. Expect 20–30 min waits.'};
    if (mins>=660&&mins<=960) return {level:'yellow',label:'🟡 Getting Busy',note:'Moderate weekend crowds.'};
  } else {
    if (mins>=720&&mins<=810) return {level:'red',label:'🔴 Lunch Rush',note:'Peak 12–1:30 PM. Food courts fastest; sit-down adds 15–25 min.'};
    if (mins>=1080&&mins<=1260) return {level:'yellow',label:'🟡 Dinner Rush',note:'Peak 6–9 PM. Popular spots fill up fast — book ahead.'};
    if (mins>=660&&mins<=840) return {level:'yellow',label:'🟡 Pre/Post Rush',note:'Slightly busy. Aim before 11:45 AM or after 1:30 PM.'};
  }
  return {level:'green',label:'🟢 Off-Peak',note:'Good timing — minimal waits expected.'};
}

const pb = document.getElementById('peakBadge');
pb.textContent = PEAK.label; pb.className = 'hpeak '+PEAK.level;

// t(en, th) — returns Thai string when S.lang==='th', otherwise English
function t(en, th) {
  return (S && S.lang === 'th' && th !== undefined) ? th : en;
}

function updateLangToggle() {
  const btn = document.getElementById('langToggle');
  const badge = document.getElementById('hdrBadge');
  if (!btn) return;
  if (S.country === 'th') {
    btn.style.display = '';
    if (S.lang === 'th') {
      btn.textContent = '🌐 EN';
      btn.title = 'Switch to English';
    } else {
      btn.textContent = '🌐 ภาษาไทย';
      btn.title = 'เปลี่ยนเป็นภาษาไทย';
    }
  } else {
    btn.style.display = 'none';
  }
  if (badge && S.country) {
    const cc = COUNTRY_CONFIG[S.country];
    if (cc) badge.textContent = `${cc.flag} Grab ${S.country === 'my' ? 'HQ' : cc.name}`;
  }
}

async function toggleLang() {
  S.lang = S.lang === 'th' ? 'en' : 'th';
  resetChat();
}

async function askLanguage() {
  await botSay('How would you like to chat?<br><span style="font-size:12px;color:#9aa">ต้องการใช้ภาษาอะไร?</span>', 600);
  setQR([
    {l:'🇬🇧 English', v:'en', fn: async () => {
      addMsg('🇬🇧 English', 'user'); qrEl.innerHTML = '';
      S.lang = 'en'; updateLangToggle(); await advance();
    }},
    {l:'🇹🇭 ภาษาไทย', v:'th', fn: async () => {
      addMsg('🇹🇭 ภาษาไทย', 'user'); qrEl.innerHTML = '';
      S.lang = 'th'; updateLangToggle(); await advance();
    }},
  ]);
}

function matchDish(input) {
  const q = input.toLowerCase().trim();
  for (const entry of DISH_MAP) {
    if (entry.keys.some(k => q.includes(k) || k.includes(q))) {
      return entry;
    }
  }
  return null;
}

function getCuisineSubOptions(r) {
  const subs = CUISINE_SUBS[r.cuisine];
  if (subs) return subs;
  // Fallback: extract first word of cuisine as search
  const fallback = r.cuisine.split('/')[0].split(' ')[0].toLowerCase();
  return [{l:`More ${r.cuisine}`, v: fallback}];
}

// ─── Time helpers ─────────────────────────────────────────────────────────────
function fmtTime(h) {
  const hour = Math.floor(h), min = Math.round((h - hour) * 60);
  const ampm = hour >= 12 ? 'PM' : 'AM';
  const h12 = hour > 12 ? hour - 12 : (hour === 0 ? 12 : hour);
  return min > 0 ? `${h12}:${String(min).padStart(2,'0')} ${ampm}` : `${h12} ${ampm}`;
}

function getOpenStatus(id) {
  const h = HOURS[id];
  if (!h) return {status:'unknown', label:'', pill:''};
  const now = new Date();
  const day = now.getDay(), t = now.getHours() + now.getMinutes() / 60;

  if (!h.days.includes(day))
    return {status:'closed', label:'Closed today',
      pill:`<span style="background:#fdecea;color:#b71c1c;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">🚫 Closed today</span>`};

  // Table & Apron style: extended hours on certain days
  let open = h.open;
  if (h.extDays && h.extDays.includes(day)) open = h.extOpen;

  if (t < open - 0.75)
    return {status:'not-yet', label:`Opens ${fmtTime(open)}`,
      pill:`<span style="background:#e3f2fd;color:#1565c0;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">🕐 Opens ${fmtTime(open)}</span>`};

  if (t < open)
    return {status:'opening-soon', label:`Opens soon — ${fmtTime(open)}`,
      pill:`<span style="background:#fffde7;color:#b45309;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">🟡 Opens ${fmtTime(open)}</span>`};

  if (t >= h.close)
    return {status:'closed', label:'Closed now',
      pill:`<span style="background:#fdecea;color:#b71c1c;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">🚫 Closed now</span>`};

  if (t >= h.close - 0.75)
    return {status:'closing-soon', label:`Closing at ${fmtTime(h.close)}`,
      pill:`<span style="background:#fff3e0;color:#c2440a;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">⚠️ Closing ${fmtTime(h.close)}</span>`};

  return {status:'open', label:`Open till ${fmtTime(h.close)}`,
    pill:`<span style="background:#e8f5e9;color:#2e7d32;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap">✅ Open till ${fmtTime(h.close)}</span>`};
}

    fresh.forEach(r => {

// ─── Scoring ──────────────────────────────────────────────────────────────────
function score(r) {
  let s = 0;

  // Country filter — r.city undefined means Malaysia (legacy records)
  const rCountry = r.city === 'thailand' ? 'th' : r.city === 'philippines' ? 'ph' : 'my';
  if (rCountry !== S.country) return -1;

  // Meal type match
  if (S.mealType === 'lunch' && !r.mealTypes.includes('lunch')) return -1;
  if (S.mealType === 'dinner' && !r.mealTypes.includes('dinner')) return -1;

  // ── Operating hours filter ───────────────────────────────────────────────
  const openStat = getOpenStatus(r.id);
  if (openStat.status === 'closed') return -1;
  if (openStat.status === 'not-yet') {
    if (S.time === 'rushed') return -1;
    s -= 6;
  }
  if (openStat.status === 'opening-soon') s -= 2;
  if (openStat.status === 'closing-soon') {
    if (S.time === 'rushed' || S.time === 'normal') s -= 10;
    else s -= 4;
  }
  if (openStat.status === 'open') s += 2; // verified open bonus

  // ── Reservation filter ───────────────────────────────────────────────────
  const res = RESERVATION[r.id];
  if (S.planningAhead === 'now') {
    if (res && res.required) return -1;        // Can't walk into these
    if (res && res.recommended) s -= 5;        // Possible walk-in but risky
  }
  if (S.planningAhead === 'ahead') {
    if (res && res.required) s += 5;           // Showcase the best reservation spots
    if (res && res.bookUrl) s += 2;
  }

  // Area filter — use country-specific area sets
  const cc = COUNTRY_CONFIG[S.country] || COUNTRY_CONFIG.my;
  let areaSet = null;
  if (S.mealType === 'lunch'  && S.areaFilter) areaSet = cc.lunchAreaSets[S.areaFilter];
  if (S.mealType === 'dinner' && S.areaFilter) areaSet = cc.dinnerAreaSets[S.areaFilter];
  if (areaSet && !areaSet.has(r.area)) return -1;

  // Hard dietary stops
  if (S.dietary.includes('halal') && !r.halal) return -1;
  if (S.dietary.includes('no-pork') && !r.halal) return -1;
  if (S.dietary.includes('vegetarian') && !r.veg) return -1;
  if (S.dietary.includes('vegan') && !r.vegan) return -1;
  if (S.dietary.includes('no-beef') && !r.noBeef) return -1;
  // Kosher: no certified Kosher in KL — proxy to vegetarian/vegan as practical alternative
  if (S.dietary.includes('kosher') && !r.veg && !r.vegan) return -1;
  // Gluten-free: soft signal (not hard exclude — cross-contamination risk remains; user warned separately)
  if (S.dietary.includes('gluten-free') && !r.gfFriendly) s -= 10;

  // Group size
  if (S.groupSize >= 9 && r.capacity === 'small') return -1;

  // Rating bonus (PH: allow 3.0+ discovery tier per local guidance)
  if (S.country === 'ph') {
    if (r.googleRating < 3.0) return -1;
    if (r.googleRating >= 4.5) s += 10;
    else if (r.googleRating >= 4.0) s += 6;
    else if (r.googleRating >= 3.5) s += 2;
  } else {
    if (r.googleRating >= 4.5) s += 10;
    else if (r.googleRating >= 4.2) s += 6;
    else if (r.googleRating >= 4.0) s += 2;
    else s -= 5;
  }

  // Trending bonus
  s += r.trending.length * 2;

  // Time
  if (S.time === 'rushed') {
    if (r.waitPeak === 'slow') return -1;
    if (S.country === 'th') {
      // Bangkok: BTS/MRT + short taxi is the norm — allow up to 20 min walk or 15 min drive
      if (r.driveMin && r.driveMin > 15) return -1;
      if (!r.driveMin && r.walkMin > 20) return -1;
    } else if (S.country === 'ph') {
      if (r.driveMin && r.driveMin > 10) return -1;
      if (!r.driveMin && r.walkMin > 5) return -1;
    } else {
      // Malaysia: office-area walk-in only
      if (r.driveMin) return -1;
      if (r.walkMin > 12) return -1;
    }
    if (r.waitPeak === 'fast') s += 8;
    if (PEAK.level === 'red' && r.waitPeak === 'moderate') s -= 3;
  }
  if (S.time === 'normal' && r.waitPeak === 'slow') s -= 4;
  if (S.time === 'relaxed') s += 2;

  // Budget — country-aware thresholds
  const caps = S.mealType === 'dinner' ? cc.dinnerBudgetCaps : cc.budgetCaps;
  if (S.budget === 'low'    && r.priceNum > caps.low)        return -1;
  if (S.budget === 'mid'    && r.priceNum > caps.mid)        return -1;
  if (S.budget === 'high'   && r.priceNum > caps.high)       s -= 3;
  if (S.budget === 'splurge'&& r.priceNum > caps.high * 2)   s += 8;
  if (S.budget === 'low'    && r.priceNum <= caps.low * 0.6) s += 6;

  // Occasion
  if (r.bestFor.includes(S.occasion)) s += 8;

  // Craving — match gives a strong boost, mismatch gives a penalty
  // 'light' uses the healthFriendly flag rather than cuisine keywords
  if (S.craving === 'light') {
    if (r.healthy) s += 12;
    else s -= 8;
  } else {
    const cMap = {
      malaysian:     ['Malaysian','Kopitiam','Nyonya','Peranakan','Ipoh','Malay'],
      localfood:     ['Filipino','Local','Convenience','Carinderia'],
      fastfood:      ['Fast Food'],
      americanfood:  ['American'],
      pasta:         ['Pasta','Italian'],
      thai:          ['Thai','Food Court','Sukiyaki','Street Food','Royal Thai','Hawker'],
      esarn:         ['Northeastern','E-sarn','Isaan'],
      thaifinedining:['Modern Thai','Royal Thai','Southern Thai'],
      rooftop:       ['Rooftop'],
      japanese:      ['Japanese','Ramen','Mazesoba','Sushi','Omakase','Wagyu','Izakaya'],
      western:       ['Western','BBQ','French','American','Spanish','Bistro','Tapas','Café','Italian','Neapolitan'],
      chinese:       ['Chinese','Taiwanese','Dim Sum','Fujian','Hotpot','Sukiyaki'],
      korean:        ['Korean'],
      latin:         ['Latin','Peruvian'],
      bold:          ['Thai','Korean','Peri-Peri','Nashville','Wagyu','BBQ','Hotpot'],
      any:           [],
    };
    const keys = cMap[S.craving]||[];
    if (!keys.length) s += 2; // 'any' — no preference, small nudge
    else if (keys.some(k => r.cuisine.toLowerCase().includes(k.toLowerCase()))) s += 12;
    else s -= 30; // Strong mismatch — craving is an explicit user choice, not a soft preference
  }

  // Vibe
  if (S.vibe !== 'any') {
    if (S.vibe === 'chill' && r.vibe === 'chill') s += 5;
    if (S.vibe === 'chill' && r.vibe === 'loud') s -= 5;
    if (S.vibe === 'moderate' && r.vibe !== 'loud') s += 2;
  }

  // Group
  if (S.groupSize >= 6 && r.capacity === 'large') s += 4;
  if (S.groupSize >= 6 && r.capacity === 'small') s -= 5;

  // Peak time penalty
  if (PEAK.level === 'red' && r.waitPeak === 'slow') s -= 6;

  // Rejection adjustments (budget thresholds follow each country's caps)
  const capMidRef = S.mealType === 'dinner' ? cc.dinnerBudgetCaps.mid : cc.budgetCaps.mid;
  const farMin = S.country === 'ph' ? 35 : 15;
  if (S.rejections.includes('too-far') && r.driveMin && r.driveMin > farMin) s -= 12;
  if (S.rejections.includes('too-expensive') && r.priceNum > capMidRef) s -= 10;
  if (S.rejections.includes('too-noisy') && r.vibe === 'loud') s -= 12;
  if (S.rejections.includes('too-quiet') && r.vibe === 'chill') s -= 10;
  if (S.rejections.includes('want-cheaper') && r.priceNum > capMidRef * 0.55) s -= 10;
  if (S.rejections.includes('different-cuisine')) {
    // Use the full cross-round cuisine history, and escalate penalty on repeat requests
    const diffCount = S.rejections.filter(v => v === 'different-cuisine').length;
    if (S.shownCuisines.some(c => r.cuisine.toLowerCase().startsWith(c))) {
      s -= diffCount >= 2 ? 40 : 20;
    }
  }
  // Use accumulated all-time history — prevents restaurants resurfacing after earlier rounds
  if (S.shown.includes(r.id)) s -= 50;
  if (S.excluded.includes(r.id)) return -1;

  // Proximity bonus
  if (r.walkMin && r.walkMin <= 3) s += 5;
  if (r.driveMin && r.driveMin <= 5) s += 3;

  return s;
}

function getSuggestions(grabOnly=false) {
  let pool = grabOnly ? DB.filter(r=>r.grab) : DB;
  return pool.map(r=>({r,s:score(r)})).filter(x=>x.s>0)
    .sort((a,b)=>b.s-a.s).slice(0,5).map(x=>x.r);
}

function buildReasons(r) {
  const tags = [];

  // Craving match — name the cuisine type that matched
  if (S.craving && S.craving !== 'any') {
    const labelsEN = {
      malaysian:'🇲🇾 Malaysian cuisine',japanese:'🍱 Japanese cuisine',
      western:'🥩 Western food',chinese:'🥟 Chinese cuisine',
      korean:'🌶️ Korean cuisine',bold:'🔥 Bold & flavourful',light:'🥗 Healthy & light',
      thai:'🇹🇭 Thai cuisine',esarn:'🌶️ E-Sarn flavours',thaifinedining:'👑 Thai fine dining',
      rooftop:'🌆 Rooftop dining',
      localfood:'🇵🇭 Local Filipino',fastfood:'🍟 Fast food',americanfood:'🇺🇸 American',pasta:'🍝 Pasta / Italian',
    };
    const labelsTH = {
      malaysian:'🇲🇾 อาหารมาเลเซีย',japanese:'🍱 อาหารญี่ปุ่น',
      western:'🥩 อาหารตะวันตก',chinese:'🥟 อาหารจีน',
      korean:'🌶️ อาหารเกาหลี',bold:'🔥 รสจัด จัดเต็ม',light:'🥗 เบาๆ เพื่อสุขภาพ',
      thai:'🇹🇭 อาหารไทย',esarn:'🌶️ อาหารอีสาน',thaifinedining:'👑 ไฟน์ไดนิ่งไทย',
      rooftop:'🌆 บนดาดฟ้า',
      localfood:'🇵🇭 Local Filipino',fastfood:'🍟 Fast food',americanfood:'🇺🇸 American',pasta:'🍝 Pasta / Italian',
    };
    const labels = t(labelsEN, labelsTH);
    if (S.craving === 'light') {
      if (r.healthy) tags.push(labels.light);
    } else {
      const cMap = {
        malaysian:['Malaysian','Kopitiam','Nyonya','Peranakan','Ipoh','Malay'],
        localfood:['Filipino','Local','Convenience','Carinderia'],
        fastfood:['Fast Food'],
        americanfood:['American'],
        pasta:['Pasta','Italian'],
        japanese:['Japanese','Ramen','Mazesoba','Sushi','Omakase','Wagyu','Izakaya'],
        western:['Western','BBQ','French','American','Spanish','Bistro','Tapas','Café'],
        chinese:['Chinese','Taiwanese','Dim Sum','Fujian','Hotpot'],
        korean:['Korean'],
        bold:['Thai','Korean','Peri-Peri','Nashville','Wagyu','BBQ','Spicy','Hotpot'],
        thai:['Thai','Street Food','Royal Thai','Food Court'],
        esarn:['Northeastern','E-sarn','Isaan'],
        thaifinedining:['Modern Thai','Royal Thai','Southern Thai'],
        rooftop:['Rooftop'],
      };
      const keys = cMap[S.craving] || [];
      if (keys.some(k => r.cuisine.toLowerCase().includes(k.toLowerCase())) && labels[S.craving])
        tags.push(labels[S.craving]);
    }
  }

  // Dietary requirements met
  if (S.dietary.includes('halal') && r.halal) tags.push(t('✅ Halal certified','✅ ฮาลาล'));
  if (S.dietary.includes('vegetarian') && r.veg) tags.push(t('🥦 Vegetarian options','🥦 มีเมนูมังสวิรัติ'));
  if (S.dietary.includes('vegan') && r.vegan) tags.push(t('🌱 Vegan friendly','🌱 เหมาะกับวีแกน'));
  if (S.dietary.includes('no-beef') && r.noBeef) tags.push(t('🥩 No beef accommodated','🥩 ไม่มีเนื้อวัว'));
  if (S.dietary.includes('gluten-free') && r.gfFriendly) tags.push(t('🌾 Lower gluten risk','🌾 ความเสี่ยงกลูเตนต่ำ'));
  if (S.dietary.includes('kosher') && (r.veg || r.vegan)) tags.push(t('🥦 Best kosher-proxy option','🥦 ตัวเลือกใกล้เคียงโคเชอร์'));

  // Very close to office
  if (r.walkMin && r.walkMin <= 5) tags.push(t(`🚶 ${r.walkMin} min from your desk`,`🚶 ${r.walkMin} นาทีจากออฟฟิศ`));

  // Occasion fit
  if (S.occasion === 'overseas-guests' && r.bestFor.includes('overseas-guests'))
    tags.push(t('🌍 Guest-worthy experience','🌍 เหมาะรับรองแขกต่างชาติ'));
  if (S.occasion === 'team-outing' && r.bestFor.includes('team-outing'))
    tags.push(t('👥 Great for team outings','👥 เหมาะกับทีม'));

  // Vibe match
  if (S.vibe === 'chill' && r.vibe === 'chill') tags.push(t('🔇 Quiet — easy to talk','🔇 เงียบ คุยงานง่าย'));
  if (S.vibe === 'moderate' && r.vibe === 'moderate') tags.push(t('🎵 Good energy','🎵 บรรยากาศดี'));

  // Group size
  if (S.groupSize >= 6 && r.capacity === 'large') tags.push(t('👥 Handles large groups','👥 รองรับกลุ่มใหญ่'));

  // Budget fit
  if (S.budget === 'low' && r.priceNum <= 15) tags.push(t('💰 Very affordable','💰 ราคาย่อมเยามาก'));
  if (S.budget === 'splurge' && r.priceNum >= 150) tags.push(t('👑 Premium experience','👑 ระดับพรีเมียม'));

  // Rating confidence (only fill if not already rich with reasons)
  if (r.googleRating >= 4.5 && tags.length < 2)
    tags.push(t(`⭐ ${r.googleRating} on Google (${r.reviews} reviews)`,`⭐ ${r.googleRating} บน Google (${r.reviews} รีวิว)`));

  // Trending (only if strong signal)
  if (r.trending.length >= 3 && tags.length < 3)
    tags.push(t('🔥 Trending across platforms','🔥 กำลังเป็นที่นิยม'));

  return tags.slice(0, 4);
}

// ─── Card builder ─────────────────────────────────────────────────────────────
function buildCard(r, isDinner=false) {
  const dist = r.walkMin
    ? `<span class="pl walk">🚶 ${r.walkMin} min walk</span>`
    : `<span class="pl drive">🚗 ~${r.driveMin} min drive</span>`;
  const transitPill = r.transit
    ? `<span class="pl bts">🚇 ${r.transit}</span>`
    : '';
  const wt = {fast:'⚡ Fast',moderate:'⏱ ~15 min',slow:'🕐 Allow time'};
  const vb = {chill:'🔇 Chill',moderate:'🎵 Moderate',loud:'🔊 Lively'};

  const badges = r.trending.map(t=>({
    tiktok:'<span class="sb tiktok">TikTok</span>',
    instagram:'<span class="sb instagram">Instagram</span>',
    xhs:'<span class="sb xhs">小红书</span>',
    klfoodie:'<span class="sb klfoodie">KL Foodie</span>',
    google:'<span class="sb wongnai" style="background:#4285F4">Google Maps</span>',
  }[t]||'')).join('');

  const isWarnPeak = PEAK.level==='red' && (r.pt||'').includes('🔴');
  const ptClass = isWarnPeak ? 'rc-pt warn' : 'rc-pt';
  const ptText = isWarnPeak
    ? `⚠️ NOW BUSY: ${(r.pt||'').replace('🔴','').trim()}`
    : `🕐 ${r.pt||''}`;

  const openStat = getOpenStatus(r.id);
  const res = RESERVATION[r.id];

  // Reservation banner (walk-in warning OR booking CTA)
  let resBanner = '';
  if (S.planningAhead === 'now' && res && res.recommended) {
    resBanner = `<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:7px;padding:6px 9px;margin-top:7px;font-size:11.5px;color:#7a4f00">
      ⚠️ <strong>Walk-in risky:</strong> ${res.note}
    </div>`;
  }
  if (S.planningAhead === 'ahead' && res && (res.required || res.recommended)) {
    const bookBtn = res.bookUrl
      ? `<a href="${res.bookUrl}" target="_blank" style="display:inline-block;margin-top:5px;font-size:11.5px;font-weight:700;color:#fff;background:#3949ab;padding:4px 12px;border-radius:20px;text-decoration:none">📅 Book a table →</a>`
      : '';
    resBanner = `<div style="background:#f0f4ff;border:1px solid #c5cae9;border-radius:7px;padding:6px 9px;margin-top:7px;font-size:11.5px;color:#1a237e">
      📅 <strong>${res.required ? 'Reservation required' : 'Booking recommended'}:</strong> ${res.note}${bookBtn}
    </div>`;
  }

  const reasons = buildReasons(r);
  const whyHtml = reasons.length
    ? `<div class="why-picks"><div class="why-label">${t('Why this pick','ทำไมถึงแนะนำ')}</div><div>${reasons.map(tag=>`<span class="why-tag">${tag}</span>`).join('')}</div></div>`
    : '';

  const menuMeta = getMenuLink(r.id);
  const menuBtn = menuMeta
    ? `<a href="${menuMeta.url}" target="_blank" title="${menuMeta.title}" style="display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;color:var(--g);text-decoration:none;padding:4px 10px;border:1.5px solid var(--g);border-radius:20px;transition:all .15s" onmouseover="this.style.background='#e6f7ee'" onmouseout="this.style.background='transparent'">${menuMeta.label}</a>`
    : '';
  const moreLikeBtn = `<button onclick="moreLikeThis(${r.id})" style="display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;color:#b06d00;background:none;border:1.5px solid #e8a020;border-radius:20px;padding:4px 10px;cursor:pointer;transition:all .15s" onmouseover="this.style.background='#fff8ee'" onmouseout="this.style.background='transparent'">🔁 More like this</button>`;
  const excludeBtn = `<button onclick="excludeRestaurant(${r.id},'${r.name.replace(/'/g,"\\'")}') " style="display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;color:#999;background:none;border:1.5px solid #ddd;border-radius:20px;padding:4px 10px;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='#e57373';this.style.color='#e57373'" onmouseout="this.style.borderColor='#ddd';this.style.color='#999'">✕ Exclude</button>`;

  return `
    <div class="rc" id="rc-${r.id}">
      <div class="rc-head ${isDinner?'dinner-head':''}">
        <div>
          <div class="rc-name">${r.name}</div>
          ${badges ? `<div class="socrow" style="margin-top:3px">${badges}</div>` : ''}
        </div>
        <div class="rc-r">
          <div class="rc-price">${r.priceRange}/pax</div>
          <div class="rc-rating">⭐ ${r.googleRating} <span style="font-weight:400;font-size:10px;color:#aaa">(${r.reviews})</span></div>
          ${openStat.pill ? `<div style="margin-top:3px">${openStat.pill}</div>` : ''}
        </div>
      </div>
      <div class="rc-body">
        <div class="rc-meta">${r.cuisine} · <span class="pl ar" style="display:inline;padding:1px 6px">${r.areaLabel}</span></div>
        <div class="rc-desc">${r.desc}</div>
        ${whyHtml}
        ${r.deal ? `<div class="rc-deal">🏷️ ${r.deal}</div>` : ''}
        ${r.pt ? `<div class="${ptClass}">${ptText}</div>` : ''}
        <div class="pills">
          ${dist}
          ${transitPill}
          <span class="pl t">${wt[r.waitPeak]}</span>
          <span class="pl vb">${vb[r.vibe]}</span>
          ${r.halal?'<span class="pl h">✅ Halal</span>':''}
          ${r.grab?`<span class="pl gr">🟢 On ${(COUNTRY_CONFIG[S.country]||COUNTRY_CONFIG.my).deliveryPlatform.split('/')[0].trim()}</span>`:''}
          ${r.capacity==='large'?'<span class="pl gp">👥 Group-friendly</span>':''}
        </div>
        ${resBanner}
        <div style="display:flex;gap:7px;margin-top:9px;flex-wrap:wrap">
          ${menuBtn}
          ${moreLikeBtn}
          ${excludeBtn}
        </div>
      </div>
    </div>`;
}

// ─── Dish search card (adds specialty note to standard card) ─────────────────
function buildDishCard(r, specialtyNote) {
  const base = buildCard(r, r.mealTypes && !r.mealTypes.includes('lunch'));
  const highlight = `
    <div style="background:#fffbe6;border:1.5px solid #f0c040;border-radius:8px;padding:7px 10px;margin:6px 0 2px;font-size:12px;line-height:1.5">
      <span style="font-weight:700;color:#b7860a">🏆 Known for this dish:</span><br>
      <span style="color:#555">${specialtyNote}</span>
    </div>`;
  return base.replace('</div>\n    </div>', `${highlight}</div>\n    </div>`);
}

async function runDishSearch(query) {
  const match = matchDish(query);
  if (!match) {
    await botSay(t(
      `I don't have a specific match for <strong>"${query}"</strong> yet — but let me find the closest options based on cuisine. You can also try a broader term like the cuisine type.`,
      `ยังไม่มีข้อมูลเฉพาะสำหรับ <strong>"${query}"</strong> — แต่เราจะหาร้านที่ใกล้เคียงที่สุดให้`
    ), 700);
    await showResults();
    return;
  }

  const validIds = match.matches.map(m => m.id);
  const candidates = DB.filter(r => {
    const rc = r.city === 'thailand' ? 'th' : r.city === 'philippines' ? 'ph' : 'my';
    return validIds.includes(r.id) && rc === S.country;
  });

  if (!candidates.length) {
    await botSay(t(
      `I know of places for <strong>${query}</strong> but they might not match your current filters (area / dietary). Try broadening your area preference.`,
      `รู้จักร้านที่ทำ <strong>${query}</strong> แต่อาจไม่ตรงกับกรองของคุณ ลองขยายพื้นที่ดูนะ`
    ), 700);
    await showFeedback(); return;
  }

  S.step = 'result';
  S.last = candidates;

  await botSay(t(
    `Found <strong>${candidates.length}</strong> restaurant${candidates.length > 1 ? 's' : ''} specifically known for <strong>${query}</strong> 👇`,
    `พบ <strong>${candidates.length}</strong> ร้านที่ขึ้นชื่อเรื่อง <strong>${query}</strong> 👇`
  ), 700);

  for (const r of candidates) {
    await new Promise(ok => setTimeout(ok, 350));
    const note = match.matches.find(m => m.id === r.id)?.note || '';
    addCard(buildDishCard(r, note));
  }

  await botSay(t("These spots are specifically known for that dish. Happy with the options?","ร้านพวกนี้ขึ้นชื่อเรื่องเมนูนั้นเป็นพิเศษ ถูกใจไหม?"), 700);
  await showFeedback();
}

// ─── Chat engine ──────────────────────────────────────────────────────────────
const chatEl=document.getElementById('chat'), qrEl=document.getElementById('qr'), inpEl=document.getElementById('inp');

function addMsg(html,who,cls='') {
  const row=document.createElement('div'); row.className=`row ${who}`;
  const bubCls = who==='bot' ? `bub bot ${cls}` : 'bub user';
  if(who==='bot') row.innerHTML=`<div class="bicon">🍽️</div><div class="${bubCls}">${html}</div>`;
  else row.innerHTML=`<div class="${bubCls}">${html}</div>`;
  chatEl.appendChild(row); scroll();
}
function addCard(html) {
  const row=document.createElement('div'); row.className='row bot';
  row.innerHTML=`<div class="bicon">🍽️</div><div style="max-width:92%;flex:1">${html}</div>`;
  chatEl.appendChild(row); scroll();
}
function showTyping(){
  const t=document.createElement('div'); t.className='typing'; t.id='typing';
  t.innerHTML=`<div class="bicon">🍽️</div><div class="tdots"><span></span><span></span><span></span></div>`;
  chatEl.appendChild(t); scroll();
}
function killTyping(){const t=document.getElementById('typing'); if(t)t.remove();}
function scroll(){setTimeout(()=>chatEl.scrollTop=chatEl.scrollHeight,60);}

function setQR(items,grabStyle=false) {
  qrEl.innerHTML='';
  items.forEach(item=>{
    const b=document.createElement('button');
    b.className='qb'+(grabStyle||item.grab?' grab-qb':'');
    b.textContent=item.l;
    b.onclick=()=>item.fn ? item.fn(item.v) : onQR(item.l,item.v);
    qrEl.appendChild(b);
  });
}

function botSay(html,delay=650,cls='') {
  return new Promise(res=>{showTyping();setTimeout(()=>{killTyping();addMsg(html,'bot',cls);res();},delay);});
}

      `อยากทานอะไร? พิมพ์ชื่อเมนูแล้วเราจะหาร้านที่ดีที่สุดให้ 👇<br><small style="color:#9aa">เช่น ข้าวมันไก่, ส้มตำ, ผัดไทย, สุกี้, ราเมน…</small>`

    inpEl.placeholder = t('Type a dish name and press Enter…','พิมพ์ชื่อเมนู แล้วกด Enter…');
    inpEl.focus();
    return;
  }

  addMsg(label,'user'); qrEl.innerHTML='';
  S[S.step] = S.step==='groupSize' ? parseInt(value) : value;

}

async function advance() {
  const cur = S.step;

  if (cur==='country')  { S.step='occasion'; await askOccasion(); return; }
  if (cur==='occasion') { S.step='mealType'; await askMealType(); return; }
  if (cur==='mealType') {
    if (S.mealType==='grab-delivery') { S.step='grab-dietary'; await askGrabFlow(); return; }
    S.step='walkInOrPlan'; await askWalkIn(); return;
  }
  if (cur==='walkInOrPlan') { S.step='areaPreference'; await askAreaPref(); return; }
  if (cur==='areaPreference') { S.step='groupSize'; await askStep('groupSize'); return; }

  // Grab sub-flow
  if (cur==='grab-dietary') { S.step='grab-craving'; await askGrabCraving(); return; }
  if (cur==='grab-craving') { S.step='grab-budget'; await askGrabBudget(); return; }
  if (cur==='grab-budget') { await showGrabResults(); return; }

  // Common steps
  const idx = ORDER_COMMON.indexOf(cur);
  if (idx === -1 || idx === ORDER_COMMON.length-1) { await showResults(); return; }
  S.step = ORDER_COMMON[idx+1];
  await askStep(S.step);
}

async function showResults() {
  S.step = 'result';
  const isDinner = S.mealType==='dinner';
  const res = getSuggestions();
  S.last = res;
  // Accumulate cross-round history so scores stay penalised across all rounds
  res.forEach(r => {
    if (!S.shown.includes(r.id)) S.shown.push(r.id);
    const c = r.cuisine.split('/')[0].trim().toLowerCase();
    if (!S.shownCuisines.includes(c)) S.shownCuisines.push(c);
  });

  if (!res.length) {
    const exhausted = S.shown.length > 0;
    await botSay(exhausted
      ? t("We've surfaced all the strong matches for your criteria — nothing genuinely new left. Try relaxing a filter or tap <strong>Start over</strong> for a fresh search.","เราแนะนำร้านที่ดีที่สุดทั้งหมดแล้ว ลองผ่อนคลายเงื่อนไข หรือกด <strong>เริ่มใหม่</strong>")
      : t("Hmm, nothing matched well with all those filters — let me adjust.","ไม่มีร้านที่ตรงทุกเงื่อนไข — ลองปรับดูนะ"), 700);
    await showFeedback(); return;
  }

  const cc = COUNTRY_CONFIG[S.country] || COUNTRY_CONFIG.my;
  const occLabel = t(
    {'overseas-guests':'for your guests','team-outing':'for the team','daily-lunch':'for you today'}[S.occasion]||'',
    {'overseas-guests':'สำหรับแขกของคุณ','team-outing':'สำหรับทีม','daily-lunch':'สำหรับคุณวันนี้'}[S.occasion]||''
  );
  const ratingNote = S.country === 'th' ? 'Google & Wongnai' : S.country === 'ph' ? 'Google Maps, TikTok & Instagram' : 'Google';
  const ratingLine = S.country === 'ph'
    ? `Here are my top picks ${occLabel} — curated from <strong>${ratingNote}</strong> (most cards <strong>⭐ 4.0+</strong> on Google; we still surface trusted 3.5★ neighbourhood gems when they’re the best fit) ${isDinner?'🌙':'☀️'}`
    : `Here are my top picks ${occLabel} — all <strong>⭐ 4.0+ rated on ${ratingNote}</strong> ${isDinner?'🌙':'☀️'}`;
  await botSay(t(
    ratingLine,
    `นี่คือตัวเลือกที่ดีที่สุด${occLabel} — ทุกร้านได้ <strong>⭐ 4.0+ บน ${ratingNote}</strong> ${isDinner?'🌙':'☀️'}`
  ), 700);

  if (PEAK.level !== 'green') {
    await botSay(`<strong>${PEAK.label}</strong> — ${PEAK.note}`, 450);
  }

  for (const r of res) {
    await new Promise(ok=>setTimeout(ok,350));
    addCard(buildCard(r, isDinner));
  }

  await botSay(t("What do you think? Hit the spot?","เป็นยังไงบ้าง? ถูกใจไหม?"), 700);
  await showFeedback();
}

    await botSay(t(
      `What dish are you looking for this time? 👇<br><small style="color:#9aa">e.g. ramen, XLB, wagyu, ribs, laksa…</small>`,
      `คราวนี้อยากทานอะไร? 👇<br><small style="color:#9aa">เช่น ส้มตำ, ผัดไทย, สุกี้, ข้าวมันไก่…</small>`
    ), 500);
    inpEl.placeholder = t('Type a dish name and press Enter…','พิมพ์ชื่อเมนู แล้วกด Enter…');
    inpEl.focus(); return;
  }
  if (value==='happy') {
    await botSay(t("Enjoy! 🙌 Come back anytime for your next food fix.","สนุกกับมื้ออาหารนะ! 🙌 แวะมาใหม่ได้เสมอ"), 600);
    const w=document.createElement('div'); w.className='reset-wrap';
    w.innerHTML=`<button class="reset-btn" onclick="resetChat()">${t('🔄 Find food again','🔄 ค้นหาอาหารอีกครั้ง')}</button>`;
    chatEl.appendChild(w); scroll(); return;
  }
  if (value==='reset') { resetChat(); return; }
  S.rejections.push(value);
  const msgsEN={
    'too-far':'Keeping it closer this time.',
    'too-expensive':'Looking for better value.',
    'too-noisy':'Finding somewhere quieter.',
    'too-quiet':'Finding somewhere with more energy.',
    'different-cuisine':'Switching cuisine direction.',
    'want-cheaper':'Going budget-friendly.',
  };
  const msgsTH={
    'too-far':'หาร้านใกล้ขึ้นให้นะ',
    'too-expensive':'หาตัวเลือกที่คุ้มค่ากว่านี้',
    'too-noisy':'หาที่เงียบกว่านี้ให้',
    'too-quiet':'หาที่คึกคักกว่านี้',
    'different-cuisine':'เปลี่ยนประเภทอาหาร',
    'want-cheaper':'หาราคาย่อมเยากว่านี้',
  };
  await botSay(t(msgsEN[value]||"Let me re-think.", msgsTH[value]||"ลองหาใหม่นะ"), 600);
  if (S.mealType==='grab-delivery') await showGrabResults();
  else await showResults();
}

// ─── Text input ───────────────────────────────────────────────────────────────
function handleSend() {
  const v=inpEl.value.trim(); if(!v) return; inpEl.value='';
  inpEl.placeholder = 'Type a message or pick above…';

  // Dish search input
  if (S.step === 'dish-search') {
    addMsg(`🔍 "${v}"`, 'user'); qrEl.innerHTML='';
    runDishSearch(v); return;
  }

  addMsg(v,'user'); qrEl.innerHTML='';
  const lv=v.toLowerCase();
  if (S.step==='feedback') {
    let val='different-cuisine';
    if(lv.match(/far|walk|close|near/))val='too-far';
    else if(lv.match(/expens|pric|cheap/))val='too-expensive';
    else if(lv.match(/nois|loud/))val='too-noisy';
    else if(lv.match(/quiet|boring|dead/))val='too-quiet';
    else if(lv.match(/good|great|perfect|thanks|yes|ok/))val='happy';
    else if(lv.match(/reset|start|again/))val='reset';
    else if(lv.match(/cheap|budget|less money/))val='want-cheaper';
    onFeedback(val); return;
  }
  botSay(t("Use the buttons for best results! Let me re-show the options:","กดปุ่มจะได้ผลดีที่สุดนะ! ขอแสดงตัวเลือกใหม่อีกครั้ง:"),500)
    .then(()=>{ if(S.step && ['craving','budget','groupSize','time','dietary','vibe'].includes(S.step)) askStep(S.step); });
}
inpEl.addEventListener('keydown',e=>{ if(e.key==='Enter') handleSend(); });

// ─── Reset & init ─────────────────────────────────────────────────────────────
function resetChat() {
  const prevLang = S && S.lang ? S.lang : 'en';
  S={step:'country',country:null,lang:prevLang,occasion:null,mealType:null,planningAhead:null,areaFilter:null,groupSize:null,time:null,dietary:[],craving:null,budget:null,vibe:null,last:[],shown:[],shownCuisines:[],rejections:[],excluded:[]};
  chatEl.innerHTML=''; qrEl.innerHTML=''; updateLangToggle(); startChat();
}

async function startChat() {
  await botSay(`Hey! 👋 I know the best spots near every Grab office.<br><br>Which office are you at?`, 700);
  S.step = 'country';
  const tabsEl = document.createElement('div');
  tabsEl.className = 'city-tabs';
  tabsEl.innerHTML = `
    <button class="city-btn" onclick="pickCountry('my')">
      <span class="city-flag">🇲🇾</span>
      <div class="city-info">
        <span class="city-name">Malaysia</span>
        <span class="city-sub">First Avenue, Petaling Jaya</span>
      </div>
    </button>
    <button class="city-btn" onclick="pickCountry('th')">
      <span class="city-flag">🇹🇭</span>
      <div class="city-info">
        <span class="city-name">Thailand</span>
        <span class="city-sub">The PARQ, Bangkok</span>
      </div>
    </button>
    <button class="city-btn" onclick="pickCountry('ph')">
      <span class="city-flag">🇵🇭</span>
      <div class="city-info">
        <span class="city-name">Philippines</span>
        <span class="city-sub">Exquadra Tower, Ortigas, Pasig</span>
      </div>
    </button>`;
  qrEl.appendChild(tabsEl);
}

window.pickCountry = async function(code) {
  const cc = COUNTRY_CONFIG[code];
  if (!cc || cc.comingSoon) return;
  const label = `${cc.flag} ${cc.name} — ${cc.office}`;
  addMsg(label, 'user'); qrEl.innerHTML = '';
  S.country = code; S.step = 'country';
  // Reset lang to 'en' when picking a new country (askLanguage will re-set it for TH)
  if (code !== 'th') S.lang = 'en';
  // Update header subtitle dynamically
  const subEl = document.querySelector('.hdr-info p');
  if (subEl) subEl.textContent = `${cc.flag} ${cc.name} · ${cc.office}`;
  updateLangToggle();
  if (code === 'th') {
    await askLanguage();
  } else {
    await advance();
  }
};

async function askOccasion() {
  const cc = COUNTRY_CONFIG[S.country] || COUNTRY_CONFIG.my;
  if (cc.countryIntro) {
    await botSay(cc.countryIntro, 900);
  }
  const hooksArr = (S.country === 'th' && S.lang === 'th' && cc.hooksTH) ? cc.hooksTH : cc.hooks;
  const hook = hooksArr[new Date().getDay() % hooksArr.length];
  await botSay(`${hook}<br><br>${PEAK.level!=='green'?`<span style="font-weight:600">${PEAK.label}</span> — ${PEAK.note}<br><br>`:''}${t("What's the occasion today?","วันนี้มาทานกับใคร?")}`, 700);
  S.step = 'occasion';
  setQR(t(
    [{l:"🌍 Hosting overseas guests",v:"overseas-guests"},{l:"👥 Team lunch / outing",v:"team-outing"},{l:"🍜 Personal lunch / dinner",v:"daily-lunch"}],
    [{l:"🌍 รับรองแขกต่างชาติ",v:"overseas-guests"},{l:"👥 ทานกับทีม / ออกไปกินข้าว",v:"team-outing"},{l:"🍜 ทานส่วนตัว",v:"daily-lunch"}]
  ));
}

startChat();
</script>
